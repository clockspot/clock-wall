<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Clock Wall</title>
<style>
  html, body {
    margin: 0;
    height: 100%;
    background: #000;
    overflow: hidden;
  }

  /*
    The stage is locked to the images' native aspect ratio (3840x2160 = 16:9)
    and sized to COVER the viewport (>= viewport in both axes), then centered.
    Because the stage aspect exactly matches the images, "cover" introduces no
    internal distortion: every layer lines up pixel-for-pixel.

      scale = max(vw/3840, vh/2160)
      width  = 3840*scale = max(100vw, (3840/2160)*100vh) = max(100vw, 177.778vh)
      height = 2160*scale = max((2160/3840)*100vw, 100vh) = max(56.25vw, 100vh)
  */
  #stage {
    position: fixed;
    top: 50%;
    left: 50%;
    width: max(100vw, 177.778vh);
    height: max(56.25vw, 100vh);
    transform: translate(-50%, -50%);
    /*
      A future "camera is angled down" keyframe effect would live here, e.g.
        perspective: 2000px;  (on a wrapper)
        transform: translate(-50%,-50%) rotateX(4deg);
      All three layers below would tilt together and stay aligned.
    */
  }

  #stage > * {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    display: block;
  }

  #bg, #fg { object-fit: fill; }  /* stage is already correct aspect */
  #fg { pointer-events: none; }
  #hands { pointer-events: none; }

  /* Debug overlay (enable with ?debug): dial outlines, centers, labels. */
  .dbg-circle { fill: none; stroke: #0f0; stroke-width: 2; opacity: .8; }
  .dbg-cross  { stroke: #0f0; stroke-width: 2; opacity: .8; }
  .dbg-label  { fill: #0f0; font: 20px sans-serif; opacity: .9; }
</style>
</head>
<body>
  <div id="stage">
    <img id="bg" src="bg.jpg" alt="">
    <!-- viewBox uses native image pixels, so clock coordinates are used directly. -->
    <svg id="hands" viewBox="0 0 3840 2160" xmlns="http://www.w3.org/2000/svg"></svg>
    <img id="fg" src="fg.png" alt="">
  </div>

<script>
"use strict";
(function () {
  // ---- Options (URL flags) -------------------------------------------------
  //   ?tick   -> second hand steps once per second instead of sweeping
  //   ?debug  -> draw dial outlines / centers / labels to validate placement
  const params  = new URLSearchParams(location.search);
  const SWEEP   = !params.has("tick");
  const DEBUG   = params.has("debug");

  // ---- Default hand styling (fractions of each clock's radius) -------------
  // Override any of these per-clock via a clock's `style` object.
  const DEFAULTS = {
    hour:   { len: 0.66, thick: 0.05, color: "#333" },
    minute: { len: 1.00, thick: 0.02, color: "#333" },
    second: { len: 1.00, thick: 0.01, color: "#a33" },
    hubGray: 0.05,   // gray center dot radius
    hubRed:  0.03,   // red center dot radius (only when a second hand exists)
    second_enabled: true,
  };

  // ---- The wall ------------------------------------------------------------
  // x,y = top-left of the dial's bounding box (image pixels); d = diameter.
  // corr = straightness correction in degrees, +clockwise / -counterclockwise.
  // tz   = IANA zone. style = optional per-clock overrides (see DEFAULTS).
  // To use a photo hand instead of a drawn one, add e.g.
  //   images: { minute: { href: "hands/min.png", pivot: 0.5 } }
  // (pivot = fraction of the image height between the rotation center and the
  //  far tip; 0.5 means the pivot is at the image's middle.)
  const CLOCKS = [
    { city: "Honolulu",     tz: "Pacific/Honolulu",   x: 284,  y: 1522, d: 652 },
    { city: "Vancouver",    tz: "America/Vancouver",  x: 750,  y: 1480, d: 320, corr: -0.7 },
    { city: "Los Angeles",  tz: "America/Los_Angeles",x: 343,  y: 731,  d: 500 },
    { city: "Regina",       tz: "America/Regina",     x: 486,  y: 339,  d: 140 },
    { city: "Denver",       tz: "America/Denver",     x: 1051, y: 398,  d: 168 },
    { city: "Dallas",       tz: "America/Chicago",    x: 1173, y: 1030, d: 220, corr: 0.6 },
    { city: "Moncton",      tz: "America/Moncton",    x: 1288, y: 1563, d: 220 },
    { city: "Philadelphia", tz: "America/New_York",   x: 1595, y: 303,  d: 325 },
    { city: "UTC",          tz: "UTC",                x: 1698, y: 1254, d: 444 },
    { city: "London",       tz: "Europe/London",      x: 2474, y: 307,  d: 430 },
    { city: "Oslo",         tz: "Europe/Oslo",        x: 2940, y: 732,  d: 224 },
    { city: "Helsinki",     tz: "Europe/Helsinki",    x: 3159, y: 346,  d: 194, corr: 0.9 },
    { city: "Perth",        tz: "Australia/Perth",    x: 2362, y: 982,  d: 290 },
    { city: "Adelaide",     tz: "Australia/Adelaide", x: 2384, y: 1485, d: 230 },
    { city: "Sydney",       tz: "Australia/Sydney",   x: 2763, y: 1253, d: 344 },
    { city: "Brisbane",     tz: "Australia/Brisbane", x: 3247, y: 1030, d: 288 },
    { city: "Auckland",     tz: "Pacific/Auckland",   x: 3260, y: 1552, d: 250 },
  ];

  const SVGNS = "http://www.w3.org/2000/svg";
  const svg = document.getElementById("hands");
  const dbg = DEBUG ? make("g") : null;

  function make(tag, attrs) {
    const el = document.createElementNS(SVGNS, tag);
    if (attrs) for (const k in attrs) el.setAttribute(k, attrs[k]);
    return el;
  }

  // Build a single hand. Uses a rotation group whose local origin is the dial
  // center, so updating the hand is just `rotate(angle)`.
  function buildHand(spec, r, images, key) {
    const g = make("g");
    const img = images && images[key];
    if (img) {
      // Photo hand: centered on the pivot, rotated about it.
      const el = make("image", { href: img.href });
      // The image is positioned once it loads (need natural size for centering).
      el.addEventListener("load", () => {
        const w = el.width.baseVal.value || img.width || 0;
        const h = el.height.baseVal.value || img.height || 0;
        const pivot = img.pivot != null ? img.pivot : 0.5;
        el.setAttribute("x", -w / 2);
        el.setAttribute("y", -h * pivot);
        el.setAttribute("width", w);
        el.setAttribute("height", h);
      });
      g.appendChild(el);
    } else {
      // Drawn hand: a rounded line pointing up (12 o'clock) from the center.
      g.appendChild(make("line", {
        x1: 0, y1: 0, x2: 0, y2: -spec.len * r,
        stroke: spec.color,
        "stroke-width": spec.thick * r,
        "stroke-linecap": "round",
      }));
    }
    return g;
  }

  // Lazily cached UTC offset (ms) per clock; refreshed to follow DST.
  function refreshOffsets() {
    const now = new Date();
    for (const c of CLOCKS) c.offset = zoneOffsetMs(c.tz, now);
  }
  function zoneOffsetMs(tz, date) {
    const f = new Intl.DateTimeFormat("en-US", {
      timeZone: tz, hour12: false,
      year: "numeric", month: "2-digit", day: "2-digit",
      hour: "2-digit", minute: "2-digit", second: "2-digit",
    });
    const p = {};
    for (const part of f.formatToParts(date)) p[part.type] = part.value;
    let hh = p.hour === "24" ? 0 : +p.hour;
    const asUTC = Date.UTC(+p.year, +p.month - 1, +p.day, hh, +p.minute, +p.second);
    // Round to whole seconds (current-era offsets are whole minutes anyway).
    return Math.round((asUTC - date.getTime()) / 1000) * 1000;
  }

  // Build the SVG scene.
  const live = [];
  for (const c of CLOCKS) {
    const r = c.d / 2;
    const cx = c.x + r, cy = c.y + r;
    const st = Object.assign({}, DEFAULTS, c.style);
    const corr = c.corr || 0;

    const g = make("g", { transform: `translate(${cx},${cy}) rotate(${corr})` });
    const hour   = buildHand(st.hour,   r, c.images, "hour");
    const minute = buildHand(st.minute, r, c.images, "minute");
    g.appendChild(hour);
    g.appendChild(minute);

    let second = null;
    if (st.second_enabled) {
      second = buildHand(st.second, r, c.images, "second");
      g.appendChild(second);
    }
    g.appendChild(make("circle", { r: st.hubGray * r, fill: st.hour.color }));
    if (st.second_enabled)
      g.appendChild(make("circle", { r: st.hubRed * r, fill: st.second.color }));

    svg.appendChild(g);
    live.push({ c, hour, minute, second });

    if (DEBUG) {
      dbg.appendChild(make("circle", { class: "dbg-circle", cx, cy, r }));
      dbg.appendChild(make("line", { class: "dbg-cross", x1: cx - 12, y1: cy, x2: cx + 12, y2: cy }));
      dbg.appendChild(make("line", { class: "dbg-cross", x1: cx, y1: cy - 12, x2: cx, y2: cy + 12 }));
      const label = make("text", { class: "dbg-label", x: cx, y: cy - r - 6, "text-anchor": "middle" });
      label.textContent = c.city;
      dbg.appendChild(label);
    }
  }
  if (DEBUG) svg.appendChild(dbg);

  // Apply a rotation only when it actually changed (cheap DOM writes).
  function setRot(g, angle) {
    if (!g || g._a === angle) return;
    g._a = angle;
    g.setAttribute("transform", `rotate(${angle})`);
  }

  // Animation loop. Per your spec & to keep DOM writes minimal:
  //   - second hand: sweeps every frame (or steps each second with ?tick)
  //   - minute hand: advances once per whole second
  //   - hour hand:   advances once per 30 seconds
  // SVG transforms are GPU-composited, so even all-frames updates are cheap;
  // the quantization above just trims redundant writes.
  function frame() {
    const now = Date.now();
    for (const it of live) {
      const t  = now + it.c.offset;
      const ms = ((t % 86400000) + 86400000) % 86400000;
      const sFloor = Math.floor(ms / 1000);

      const secVal = SWEEP ? ms / 1000 : sFloor;       // smooth or stepped
      const minVal = sFloor / 60;                       // updates each second
      const hrVal  = (Math.floor(sFloor / 30) * 30) / 3600; // updates each 30s

      setRot(it.second, (secVal % 60) * 6);             // 360/60
      setRot(it.minute, (minVal % 60) * 6);             // 360/60
      setRot(it.hour,   (hrVal % 12) * 30);             // 360/12
    }
    requestAnimationFrame(frame);
  }

  refreshOffsets();
  setInterval(refreshOffsets, 5 * 60 * 1000); // re-check DST periodically
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>

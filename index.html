      <g transform="translate(1181.5,1181.5) scale(8.7844,-8.7844)">

        <polygon points="1,91.805 10.42,1.295 -10.42,1.295 -1,91.805" style="fill:currentColor;"/>

    <symbol id="philadelphia-minute" viewBox="0 0 2363 2363" style="fill-rule:evenodd;clip-rule:evenodd">

    <!-- Sydney: "burgundy clock" ATO arrow hour + ATO minute (burgundy clock.scad). -->
    <symbol id="sydney-hour" viewBox="0 0 2363 2363" style="fill-rule:evenodd;clip-rule:evenodd">
      <g transform="translate(1181.5,1181.5) scale(15.8825,-15.8825)">
        <circle cx="0" cy="0" r="7.5" style="fill:currentColor;"/>
        <polygon points="-3.5,0.8 -1.5,45.1764 1.5,45.1764 3.5,0.8" style="fill:currentColor;"/>
        <polygon points="-14.3,35.1764 0,48.1764 14.3,35.1764" style="fill:currentColor;"/>

    </symbol>
    <symbol id="sydney-minute" viewBox="0 0 2363 2363" style="fill-rule:evenodd;clip-rule:evenodd">
      <g transform="translate(1181.5,1181.5) scale(15.8825,-15.8825)">
        <circle cx="0" cy="0" r="6.25" style="fill:currentColor;"/>
        <polygon points="-2.75,-29.756 -0.7,74.39 0.7,74.39 2.75,-29.756" style="fill:currentColor;"/>
      </g>

    <!-- Perth: Westclox tapered blades (westclox.scad). -->
    <symbol id="perth-hour" viewBox="0 0 2363 2363" style="fill-rule:evenodd;clip-rule:evenodd">
      <g transform="translate(1181.5,1181.5) scale(19.4967,-19.4967)">
        <circle cx="0" cy="0" r="5" style="fill:currentColor;"/>
        <polygon points="-3,0 3,0 0.5,41.5 -0.5,41.5" style="fill:currentColor;"/>

    <symbol id="perth-minute" viewBox="0 0 2363 2363" style="fill-rule:evenodd;clip-rule:evenodd">
      <g transform="translate(1181.5,1181.5) scale(19.4967,-19.4967)">
        <circle cx="0" cy="0" r="4" style="fill:currentColor;"/>
        <polygon points="-2.25,0 2.25,0 0.4,60.6 -0.4,60.6" style="fill:currentColor;"/>
      </g>
    </symbol>
  </svg>

<script>
"use strict";
(function () {
  ////////// Begin config //////////

  //Clock definitions
  //city   = reference; not shown except in debug
  //tz     = IANA zone
  //cx,cy  = dial center (per original image pixels from top left)
  //d      = diameter (pixels)
  //Optional:
  //factor = per-clock hand-width multiplier (overrides default)
  //style  = per-clock/per-property overrides of DEFAULTS below
  //corr   = straightness correction in degrees, +clockwise / -counterclockwise
  //second = "sweep" (smooth), "tick" (1/s), or a number = steps per second
  //         (e.g. 4 for a coarser sweep; fewer steps = lighter CPU without a GPU)
  //svg    = to use a drawn SVG hand instead of the built-in line, add e.g.:
  //  svg: { minute: {...}, hour: {...}, second: { href: "#my-second", scale: 1, angle: 0 } }
  //  Keys are hour/minute/second (second only used when `second` is set).
  //  href references an in-document <symbol> (see the sprite sheet below <body>);
  //  the art is pivoted on the symbol's viewBox center (author the hand so its
  //  rotation hub sits at the center of the viewBox).
  //  scale = size as a fraction of the clock radius; the half-viewBox maps to
  //          scale * radius (1 reaches the dial edge). Default 1.
  //  angle = degrees to rotate the art so it points "up" at rest (12 o'clock),
  //          +clockwise. Default 0.
  //  color = fill for parts of the symbol drawn with fill:currentColor (the
  //          bundled symbols use it). Omit to inherit (black). One symbol can
  //          thus be reused across clocks at different colors.
  //  When svg hands are used, the matching drawn hub dot is not drawn unless the
  //  clock's style explicitly sets it (hubHrMin for hour/minute, hubSec for second).
  const CLOCKS = [
    { city: "Honolulu",     tz: "Pacific/Honolulu",   cx: 412,  cy: 1663, d: 272, svg: {
      minute: { href: "#honolulu-minute", scale: 1.751, angle: 0,  color: "#1a1b19" },
      hour:   { href: "#honolulu-hour",   scale: 1.751, angle: 90, color: "#1a1b19" }
    } },
    { city: "Vancouver",    tz: "America/Vancouver",  cx: 905,  cy: 1645, d: 320, corr: -0.7, svg: {
      minute: { href: "#vancouver-minute", scale: 1, angle: 0, color: "#1a1b19" },
      hour:   { href: "#vancouver-hour",   scale: 1, angle: 0, color: "#1a1b19" }
    } },
    { city: "Los Angeles",  tz: "America/Los_Angeles",cx: 598,  cy: 983,  d: 500, corr: 0.5, svg: {
      minute: { href: "#la-minute", scale: 1, angle: 0, color: "#1a1b19" },
      hour:   { href: "#la-hour",   scale: 1, angle: 0, color: "#1a1b19" }
    } },
    { city: "Regina",       tz: "America/Regina",     cx: 564,  cy: 413,  d: 138, svg: {
      minute: { href: "#regina-minute", scale: 1, angle: 0, color: "#1a1b19" },
      hour:   { href: "#regina-hour",   scale: 1, angle: 0, color: "#1a1b19" }
    } },
    { city: "Denver",       tz: "America/Denver",     cx: 1140, cy: 486,  d: 162, svg: {
      minute: { href: "#denver-minute", scale: 1, angle: 0, color: "#1a1b19" },
      hour:   { href: "#denver-hour",   scale: 1, angle: 0, color: "#1a1b19" }
    } },
    { city: "Dallas",       tz: "America/Chicago",    cx: 1281, cy: 1141, d: 218, corr: 0.6, svg: {
      minute: { href: "#dallas-minute", scale: 1, angle: 0, color: "#28292c" },
      hour:   { href: "#dallas-hour",   scale: 1, angle: 0, color: "#28292c" }
    } },
    { city: "Moncton",      tz: "America/Moncton",    cx: 1395, cy: 1676, d: 220, factor: 1.5 },
    { city: "Philadelphia", tz: "America/New_York",   cx: 1920, cy: 632,  d: 645, second: 25, svg: {
      minute: { href: "#philadelphia-minute", scale: 1, angle: 0, color: "#1a1b19" },
      hour:   { href: "#philadelphia-hour",   scale: 1, angle: 0, color: "#1a1b19" },
      second: { href: "#philadelphia-second", scale: 1, angle: 0, color: "#884444" }
    } },
    { city: "UTC",          tz: "UTC",                cx: 1920, cy: 1478, d: 448, svg: {
      minute: { href: "#utc-minute", scale: 1, angle: 0, color: "#2a2b29" },
      hour:   { href: "#utc-hour",   scale: 1, angle: 0, color: "#2a2b29" }
    } },
    { city: "London",       tz: "Europe/London",      cx: 2683, cy: 527,  d: 420, svg: {
      minute: { href: "#london-minute", scale: 1.12, angle: 0,   color: "#1a1b19" },
      hour:   { href: "#london-hour",   scale: 1.12, angle: -90, color: "#1a1b19" }
    } },
    { city: "Oslo",         tz: "Europe/Oslo",        cx: 3048, cy: 844,  d: 220, svg: {
      minute: { href: "#oslo-minute", scale: 1, angle: 0, color: "#1a1b19" },
      hour:   { href: "#oslo-hour",   scale: 1, angle: 0, color: "#1a1b19" }
    } },
    { city: "Helsinki",     tz: "Europe/Helsinki",    cx: 3245, cy: 449,  d: 190, corr: 0.9, svg: {
      minute: { href: "#helsinki-minute", scale: 2.538, angle: 0,  color: "#1a1b19" },
      hour:   { href: "#helsinki-hour",   scale: 2.538, angle: 90, color: "#1a1b19" }
    } },
    { city: "Perth",        tz: "Australia/Perth",    cx: 2509, cy: 1126, d: 290, svg: {
      minute: { href: "#perth-minute", scale: 1, angle: 0, color: "#2a2b29" },
      hour:   { href: "#perth-hour",   scale: 1, angle: 0, color: "#2a2b29" }
    } },
    { city: "Adelaide",     tz: "Australia/Adelaide", cx: 2503, cy: 1605, d: 228, svg: {
      minute: { href: "#adelaide-minute", scale: 2.032, angle: 0,  color: "#2a2b29" },
      hour:   { href: "#adelaide-hour",   scale: 2.032, angle: 90, color: "#2a2b29" }
    } },
    { city: "Sydney",       tz: "Australia/Sydney",   cx: 2939, cy: 1427, d: 344, svg: {
      minute: { href: "#sydney-minute", scale: 1, angle: 0, color: "#1a1b19" },
      hour:   { href: "#sydney-hour",   scale: 1, angle: 0, color: "#1a1b19" }
    } },
    { city: "Brisbane",     tz: "Australia/Brisbane", cx: 3393, cy: 1174, d: 288, corr: -0.3, svg: {
      minute: { href: "#brisbane-minute", scale: 1.620, angle: 0,  color: "#1a1b19" },
      hour:   { href: "#brisbane-hour",   scale: 1.620, angle: 90, color: "#1a1b19" }
    } },
    { city: "Auckland",     tz: "Pacific/Auckland",   cx: 3396, cy: 1680, d: 245, corr: -0.8, svg: {
      minute: { href: "#auckland-minute", scale: 1.896, angle: 0,  color: "#1a1b19" },
      hour:   { href: "#auckland-hour",   scale: 1.896, angle: 90, color: "#1a1b19" }
    } },
  ];

  //Default hand styles
  //Expressed in fraction of each clock's radius
  //Override per-clock and per-parameter via a clock's `style` object
  //See also hr/min hand shadow in <style> block
  const DEFAULTS = {
    hour:   { len: 0.66, thick: 0.07, color: "#222" },
    minute: { len: 1.00, thick: 0.05, color: "#222" },
    second: { len: 1.00, thick: 0.02, color: "#743", cb: 0.4 },
    hubHrMin: 0.07,
    hubSec:  0.03,
    factor: 1 //multiplier for hand thickness and hub-dot radius; can also be overridden by ?factor URL param for tweaking
  };
  
  //Hub for clocks with no second hand, non-scaled (imitates minute arbor)
  const PLAIN_HUB_R = 4.5;

  //Warp/keyframe effect
  //Applies to hands/debug/grid only, to match photo perspective
  const WARP_SX = 1;
  const WARP_SY = 1;
  const WARP_TILT = -0.25; //rotation around x axis (at center of viewport) in degrees
  const WARP_PERSP = 400; //"distance" to the tilted plane, in IMAGE pixels (viewBox units); converted to CSS px from the current render size, so the effect is independent of viewport size / zoom

  ////////// End config //////////


  const SVGNS = "http://www.w3.org/2000/svg";
  const svg = document.getElementById("hands");
  const svgSec = document.getElementById("hands-sec");

  //Utility to get a value from parameter if specified, or default
  const num = (k, d) => (params.has(k) ? parseFloat(params.get(k)) : d);

  const params  = new URLSearchParams(location.search);
  const DEBUG   = params.has("debug");
  const GRID    = params.has("grid");

  const GRID_STEP = (() => {
    const v = num("grid", 240);
    return Number.isFinite(v) && v > 0 ? v : 240;
  })();

  const GLOBAL_FACTOR = num("factor", DEFAULTS.factor);

  const WARP = {
    scaleX: num("sx",    WARP_SX),
    scaleY: num("sy",    WARP_SY),
    tilt:   num("tilt",  WARP_TILT),
    persp:  num("persp", WARP_PERSP),
  };
  //WARP.persp is in image pixels. CSS perspective() wants CSS px, and the layer
  //renders at a viewport-dependent size, so convert using the current render
  //width (vs the 3840px-wide image). This keeps the perspective strength tied to
  //the image rather than to viewport size / browser zoom. Re-run on resize.
  const stage = document.getElementById("stage");
  function applyWarp() {
    const renderW = stage.getBoundingClientRect().width; //layout CSS px (tracks zoom)
    const perspPx = WARP.persp * (renderW / 3840);
    const css =
      `perspective(${perspPx}px) rotateX(${WARP.tilt}deg) ` +
      `scale(${WARP.scaleX}, ${WARP.scaleY})`;
    svg.style.transform = css;
    svgSec.style.transform = css;
  }
  applyWarp();
  addEventListener("resize", applyWarp);

  function make(tag, attrs) {
    const el = document.createElementNS(SVGNS, tag);
    if (attrs) for (const k in attrs) el.setAttribute(k, attrs[k]);
    return el;
  }

  function buildHand(spec, r, art, key) {
    const g = make("g");
    const a = art && art[key];
    if (a) {
      //SVG hand: an in-document <symbol> instanced via <use>, pivoted on its
      //viewBox center. The square box spans scale*radius from the center, so the
      //art's viewBox center sits at the origin and scale=1 reaches the dial edge.
      //`angle` rotates the art to point up at rest; the clock animation rotates `g`.
      const scale = a.scale != null ? a.scale : 1;
      const w = 2 * scale * r;
      const holder = make("g", { transform: `rotate(${a.angle || 0})` });
      //color drives any fill:currentColor in the symbol (the bundled ones use it)
      if (a.color != null) holder.style.color = a.color;
      holder.appendChild(make("use", {
        href: a.href, x: -w / 2, y: -w / 2, width: w, height: w,
      }));
      g.appendChild(holder);
    } else {
      //Drawn hand: a rounded line pointing up from the center
      //Counterbalance (spec.cb) extends a tail down from center
      const tail = (spec.cb || 0) * spec.len * r;
      g.appendChild(make("line", {
        x1: 0, y1: tail, x2: 0, y2: -spec.len * r,
        stroke: spec.color,
        "stroke-width": spec.thick * r,
        "stroke-linecap": "round",
      }));
    }
    return g;
  }

  //Cached UTC offset (ms) per clock, refreshed to follow DST
  function refreshOffsets() {
    const now = new Date();
    for (const c of CLOCKS) c.offset = zoneOffsetMs(c.tz, now);
  }
  function zoneOffsetMs(tz, date) {
    const f = new Intl.DateTimeFormat("en-US", {
      timeZone: tz, hour12: false,
      year: "numeric", month: "2-digit", day: "2-digit",
      hour: "2-digit", minute: "2-digit", second: "2-digit",
    });
    const p = {};
    for (const part of f.formatToParts(date)) p[part.type] = part.value;
    let hh = p.hour === "24" ? 0 : +p.hour;
    const asUTC = Date.UTC(+p.year, +p.month - 1, +p.day, hh, +p.minute, +p.second);
    //Round to whole seconds
    return Math.round((asUTC - date.getTime()) / 1000) * 1000;
  }

  //Resolve a hand's drawn style
  //Overrides are merged per-property
  function handSpec(c, name, factor) {
    const base = DEFAULTS[name];
    const ov = (c.style && c.style[name]) || {};
    return {
      len:   ov.len   != null ? ov.len   : base.len,
      color: ov.color != null ? ov.color : base.color,
      thick: ov.thick != null ? ov.thick : base.thick * factor,
      cb:    ov.cb    != null ? ov.cb    : base.cb,
    };
  }
  const pick = (c, key, factor) =>
    (c.style && c.style[key] != null) ? c.style[key] : DEFAULTS[key] * factor;

  //Second-hand step rate, in steps per second:
  //  "sweep" = smooth (a step every animation frame, ~60/s)
  //  "tick"  = 1/s (the usual quartz tick); a number N = N steps/s
  //Fewer steps = fewer repaints = lighter CPU when there's no GPU to composite.
  const SWEEP = Infinity;
  function secondHz(v) {
    if (v === "sweep") return SWEEP;
    if (typeof v === "number" && v > 0) return v;
    return 1; //"tick" (or any other truthy value enabling a second hand)
  }

  //Build the SVG scene
  const dbg = DEBUG ? make("g") : null;
  const live = [];
  for (const c of CLOCKS) {
    const r = c.d / 2;
    const cx = c.cx, cy = c.cy;
    const corr = c.corr || 0;
    const hasSecond = !!c.second;
    const factor = c.factor != null ? c.factor : GLOBAL_FACTOR;

    const baseT = `translate(${cx},${cy}) rotate(${corr})`;
    const hourSpec   = handSpec(c, "hour",   factor);
    const minuteSpec = handSpec(c, "minute", factor);

    //Shadowed layer: hours, minutes, non-second hub
    //SVG hands carry their own hub, so skip the drawn one unless hubHrMin is set
    const g = make("g", { transform: baseT });
    const svgHand = c.svg && (c.svg.hour || c.svg.minute);
    const hubExplicit = c.style && c.style.hubHrMin != null;
    if (!svgHand || hubExplicit)
      g.appendChild(make("circle", { r: pick(c, "hubHrMin", factor) * r, fill: hourSpec.color }));
    const hour   = buildHand(hourSpec,   r, c.svg, "hour");
    const minute = buildHand(minuteSpec, r, c.svg, "minute");
    g.appendChild(hour);
    g.appendChild(minute);
    if (!hasSecond)
      g.appendChild(make("circle", { r: PLAIN_HUB_R, fill: "#333333" }));
    svg.appendChild(g);

    //Unfiltered layer: seconds and second hub
    let second = null;
    if (hasSecond) {
      const secondSpec = handSpec(c, "second", factor);
      const gs = make("g", { transform: baseT });
      second = buildHand(secondSpec, r, c.svg, "second");
      gs.appendChild(second);
      //As with hubHrMin: an SVG second hand carries its own hub, so skip the
      //drawn one unless the clock's style explicitly sets hubSec
      const secHubExplicit = c.style && c.style.hubSec != null;
      if (!(c.svg && c.svg.second) || secHubExplicit)
        gs.appendChild(make("circle", { r: pick(c, "hubSec", factor) * r, fill: secondSpec.color }));
      svgSec.appendChild(gs);
    }
    live.push({ c, hour, minute, second, secHz: secondHz(c.second) });

    if (DEBUG) {
      dbg.appendChild(make("circle", { class: "dbg-circle", cx, cy, r }));
      dbg.appendChild(make("line", { class: "dbg-cross", x1: cx - 12, y1: cy, x2: cx + 12, y2: cy }));
      dbg.appendChild(make("line", { class: "dbg-cross", x1: cx, y1: cy - 12, x2: cx, y2: cy + 12 }));
      const label = make("text", { class: "dbg-label", x: cx, y: cy - r - 6, "text-anchor": "middle" });
      label.textContent = c.city;
      dbg.appendChild(label);
    }
  }
  if (DEBUG) svgSec.appendChild(dbg);

  //Alignment grid (?grid)
  if (GRID) {
    const W = 3840, H = 2160, gg = make("g");
    //Dim the wall behind the grid so the green lines stand out
    gg.appendChild(make("rect", { x: 0, y: 0, width: W, height: H, fill: "#000", opacity: 0.2 }));
    for (let x = 0; x <= W; x += GRID_STEP) {
      gg.appendChild(make("line", { class: "grid-line", x1: x, y1: 0, x2: x, y2: H }));
      const t = make("text", { class: "grid-label", x: x + 4, y: 18 });
      t.textContent = Math.round(x);
      gg.appendChild(t);
    }
    for (let y = 0; y <= H; y += GRID_STEP) {
      gg.appendChild(make("line", { class: "grid-line", x1: 0, y1: y, x2: W, y2: y }));
      const t = make("text", { class: "grid-label", x: 4, y: y - 5 });
      t.textContent = Math.round(y);
      gg.appendChild(t);
    }
    //Emphasized center axes
    gg.appendChild(make("line", { class: "grid-axis", x1: W / 2, y1: 0, x2: W / 2, y2: H }));
    gg.appendChild(make("line", { class: "grid-axis", x1: 0, y1: H / 2, x2: W, y2: H / 2 }));
    svgSec.appendChild(gg);
  }

  //Apply a rotation only when it actually changed
  function setRot(g, angle) {
    if (!g || g._a === angle) return;
    g._a = angle;
    g.setAttribute("transform", `rotate(${angle})`);
  }

  //Animation loop
  //To minimize DOM writes, each hand is moved only when it would be perceptible
  //SVG transforms are GPU-composited (vs. p5/canvas manual work)
  function frame() {
    const now = Date.now();
    for (const it of live) {
      const t  = now + it.c.offset;
      const ms = ((t % 86400000) + 86400000) % 86400000;
      const sFloor = Math.floor(ms / 1000);

      //Quantize seconds to the hand's step rate; setRot then writes (and the
      //browser repaints) only when the stepped angle actually changes.
      const secVal = it.secHz === SWEEP
        ? ms / 1000                                  //smooth
        : Math.floor((ms / 1000) * it.secHz) / it.secHz; //N steps/s
      const minVal = sFloor / 60; //updates each second
      const hrVal  = (Math.floor(sFloor / 30) * 30) / 3600; //updates each 30s

      setRot(it.second, (secVal % 60) * 6);
      setRot(it.minute, (minVal % 60) * 6);
      setRot(it.hour,   (hrVal % 12) * 30);
    }
    requestAnimationFrame(frame);
  }

  refreshOffsets();
  setInterval(refreshOffsets, 5 * 60 * 1000);

  requestAnimationFrame(frame);
})();
</script>
